<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DC Schools Data — Source Finder</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background:#f6f7f9; }
  .topbar { background:#1b365d; color:#fff; }
  .src-card { background:#fff; border:1px solid #e3e6ea; border-radius:.5rem; padding:1rem 1.25rem; margin-bottom:.85rem; }
  .src-card h5 { margin-bottom:.35rem; }
  .topic-tag { font-size:.72rem; background:#eef1f5; color:#345; border-radius:1rem; padding:.1rem .55rem; margin-right:.25rem; display:inline-block; }
  .topic-btn { font-size:.82rem; cursor:pointer; background:#fff; border:1px solid #c5ccd6; color:#234; border-radius:1rem; padding:.18rem .75rem; margin:.15rem .3rem .15rem 0; display:inline-block; }
  .topic-btn:hover { border-color:#1b365d; }
  .topic-btn.active { background:#1b365d; color:#fff; border-color:#1b365d; }
  .year-chip { font-size:.8rem; background:#e7f0fa; color:#1b365d; border:1px solid #c5d8ec; border-radius:.35rem; padding:.12rem .5rem; margin:.12rem .25rem .12rem 0; display:inline-block; text-decoration:none; }
  .year-chip:hover { background:#1b365d; color:#fff; }
  .filepair { display:inline-flex; margin:.12rem .4rem .12rem 0; }
  .filepair .year-chip { margin:0; }
  .filepair .dl { border-radius:.35rem 0 0 .35rem; }
  .filepair .pg { border-radius:0 .35rem .35rem 0; border-left:none; padding:.12rem .45rem; background:#eef3ea; border-color:#cdddb9; color:#2f5524; }
  .filepair .pg:hover { background:#2f5524; color:#fff; }
  .file-line { font-size:.85rem; padding:.15rem 0; border-bottom:1px dashed #eee; }
  .file-cols { color:#566; font-size:.8rem; }
  details.files > summary { cursor:pointer; color:#2a6db0; font-size:.9rem; }
  .meta { font-size:.85rem; color:#566; }
  .note { font-size:.86rem; color:#333; }
  mark { padding:0 .1em; }
  .overlap-card { background:#fff; border-left:4px solid #1b365d; border-radius:.4rem; padding:.9rem 1.1rem; margin-bottom:.85rem; }
</style>
</head>
<body>

<div class="topbar py-3 mb-3">
  <div class="container">
    <h3 class="mb-0">DC K-12 Public Schools — Data Source Finder</h3>
    <div class="small opacity-75" id="subtitle">loading…</div>
  </div>
</div>

<div class="container">
  <div class="row g-2 mb-3">
    <div class="col-12 col-lg-5">
      <input id="q" type="search" class="form-control form-control-lg"
             placeholder="Search: AP, SAT, truancy, enrollment, per-pupil, lottery…" autofocus>
    </div>
    <div class="col-8 col-lg-4"><select id="owner" class="form-select"></select></div>
    <div class="col-4 col-lg-2 d-grid"><button id="clear" class="btn btn-outline-secondary">Clear</button></div>
  </div>

  <div id="topicchips" class="mb-3"></div>

  <ul class="nav nav-tabs mb-3">
    <li class="nav-item"><a class="nav-link active" href="#" id="tab-files">Search files</a></li>
    <li class="nav-item"><a class="nav-link" href="#" id="tab-sources">Sources</a></li>
    <li class="nav-item"><a class="nav-link" href="#" id="tab-overlaps">Same data, different places</a></li>
  </ul>

  <div id="count" class="meta mb-2"></div>
  <div id="files"></div>
  <div id="results" style="display:none"></div>
  <div id="overlaps" style="display:none"></div>
</div>

<footer class="container py-4 meta">
  Generated from <code>sources.yaml</code> + <code>data_files.yaml</code>. Edit those and run
  <code>python generate_readme.py</code> to rebuild. <span id="verified"></span>
</footer>

<script src="catalog.js"></script>
<script>
// ----- fail loud if the data didn't load -----
if (!window.CATALOG) {
  document.getElementById("results").innerHTML =
    '<div class="alert alert-danger">catalog.js did not load. Run <code>python generate_readme.py</code>, '
    + 'and open this page over http (e.g. <code>python -m http.server</code>) if your browser blocks local scripts.</div>';
  throw new Error("CATALOG missing");
}

const CAT = window.CATALOG;
// single home for filter state — nothing else writes these
const state = { q: "", owner: "", topic: "", view: "files" };

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// highlight each query term in already-escaped text
function highlight(escaped, terms) {
  let html = escaped;
  for (const t of terms) {
    if (t.length < 2) continue;
    const re = new RegExp("(" + t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
    html = html.replace(re, "<mark>$1</mark>");
  }
  return html;
}

function queryTerms() {
  return state.q.toLowerCase().split(/\s+/).filter(Boolean);
}

function matches(source) {
  const terms = queryTerms();
  if (!terms.every(t => source.search.includes(t))) return false;
  if (state.owner && source.owner !== state.owner) return false;
  if (state.topic && !source.topics.includes(state.topic)) return false;
  return true;
}

function fileSummary(f) {
  if (f.status === "needs_browser") return "behind Box/Egnyte — resolve in a browser";
  if (f.status === "error") return "download/parse error";
  if (f.kind === "xlsx" || f.kind === "xls") {
    const tabs = f.tabs || [];
    const biggest = tabs.slice().sort((a, b) => b.n_rows - a.n_rows)[0];
    const cols = biggest && biggest.columns.length ? " — cols: " + biggest.columns.slice(0, 10).join(", ") : "";
    return tabs.length + " tab(s): " + tabs.map(t => t.name).join(", ") + cols;
  }
  if (f.kind === "csv") return (f.n_rows != null ? f.n_rows + " rows × " : "") + (f.columns || []).length
    + " cols — " + (f.columns || []).slice(0, 10).join(", ");
  if (f.kind === "pdf") return f.has_tabular_data
    ? f.n_pages + " pages, extractable tables on ~" + f.n_table_pages + " page(s)"
    : f.n_pages + " pages (narrative; no extractable tables)";
  return f.kind;
}

function sourceCard(source, terms) {
  const topics = source.topics.map(t => '<span class="topic-tag">' + esc(t) + "</span>").join("");
  const files = source.files || [];
  let filesHtml = "";
  if (files.length) {
    const lines = files.map(f =>
      '<div class="file-line"><a href="' + esc(f.url) + '" target="_blank" rel="noopener">'
      + esc(f.name) + "</a> <span class=\"text-muted\">[" + esc(f.kind)
      + (f.year ? " · " + esc(f.year) : "") + "]</span><div class=\"file-cols\">"
      + esc(fileSummary(f)) + "</div></div>").join("");
    filesHtml = '<details class="files mt-2"><summary>' + files.length
      + " downloadable file(s) — tabs & columns</summary>" + lines + "</details>";
  }
  const note = source.notes
    ? '<div class="note mt-2">' + highlight(esc(source.notes), terms) + "</div>" : "";
  return '<div class="src-card">'
    + '<h5><a href="' + esc(source.url) + '" target="_blank" rel="noopener">'
    + highlight(esc(source.name), terms) + "</a></h5>"
    + '<div class="mb-1">'
    + '<span class="badge bg-light text-dark border">' + esc(source.owner) + "</span> "
    + (source.status && source.status !== "ok" ? '<span class="badge bg-warning text-dark">' + esc(source.status) + "</span>" : "")
    + "</div><div class=\"mb-1\">" + topics + "</div>"
    + '<div class="meta">' + esc(source.format) + " · updated " + esc(source.cadence) + " · " + esc(source.years) + "</div>"
    + note + filesHtml + "</div>";
}

function renderSources() {
  const terms = queryTerms();
  const hits = CAT.sources.filter(matches);
  document.getElementById("count").textContent =
    hits.length + " of " + CAT.sources.length + " sources";
  document.getElementById("results").innerHTML =
    hits.length ? hits.map(s => sourceCard(s, terms)).join("")
                : '<div class="alert alert-light border">No sources match. Try fewer words or Clear.</div>';
}

function overlapMatches(ov) {
  const terms = queryTerms();
  if (!terms.length) return true;
  const blob = (ov.topic + " " + ov.difference + " " + ov.sources.map(s => s.name).join(" ")).toLowerCase();
  return terms.every(t => blob.includes(t));
}

function renderOverlaps() {
  const terms = queryTerms();
  const hits = CAT.overlaps.filter(overlapMatches);
  document.getElementById("count").textContent = hits.length + " overlap topics";
  document.getElementById("overlaps").innerHTML = hits.map(ov => {
    const links = ov.sources.map(s =>
      '<li><a href="' + esc(s.url) + '" target="_blank" rel="noopener">' + esc(s.name)
      + "</a> <span class=\"text-muted small\">" + esc(s.owner) + "</span></li>").join("");
    return '<div class="overlap-card"><h5>' + highlight(esc(ov.topic), terms) + "</h5>"
      + '<p class="note">' + highlight(esc(ov.difference), terms) + "</p>"
      + "<ul class=\"mb-0\">" + links + "</ul></div>";
  }).join("");
}

// ----- flat file index: one entry per downloadable file, searchable by its own
// name + source + every tab/column/table-header it contains -----
const ALL_FILES = CAT.sources.flatMap(s => (s.files || []).map(f => {
  const bits = [f.name, s.name, s.owner, f.year || ""];
  for (const tab of f.tabs || []) { bits.push(tab.name); bits.push(...tab.columns); }
  bits.push(...(f.columns || []));
  for (const t of f.tables || []) bits.push(...t.header);
  return { file: f, sourceName: s.name, sourceUrl: f.page || s.url, owner: s.owner, text: bits.join(" ").toLowerCase() };
}));

// Short terms (AP, SAT, EL) match whole words only, so "AP" doesn't hit "chapter".
// Longer terms (enroll, attendance) match as substrings.
function fileTermMatch(text, term) {
  if (term.length <= 3) {
    return new RegExp("\\b" + term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\b", "i").test(text);
  }
  return text.includes(term);
}

// strip year / version / date / dedupe tokens so the same dataset across years
// collapses to one series. Keep case for display; lowercase version is the key.
function stripYearTokens(name) {
  return name
    .replace(/\bSY\s*\d{2}\s*[_-]?\s*\d{2}\b/gi, " ")        // SY23_24
    .replace(/\b(19|20)\d{2}\s*[-–]\s*\d{2}\b/g, " ")        // 2024-25
    .replace(/\b\d{1,2}[._]\d{1,2}[._]\d{2,4}\b/g, " ")      // 9.30.25 dates
    .replace(/\b(19|20)\d{2}\b/g, " ")                       // 2025
    .replace(/\b\d{4}\b/g, " ")                              // 2223
    .replace(/\bv\d+\b/gi, " ")                              // v2 / v3
    .replace(/\([^)]*\)/g, " ")                              // (2025), (9.30.25), (2)
    .replace(/\b(update|corrected|website|final|nw)\b/gi, " ")
    .replace(/[_]+/g, " ");
}
function seriesTitle(name) {
  let t = stripYearTokens(name)
    .replace(/^\s*(Enrollment Patterns|Population and Students|Public School Facilities|School Equity Reports|Discipline & Attendance|At-Risk Funding|PMF Archive)\s*[—–-]\s*/i, "")
    .replace(/EdScape[_ ]Chapter\s*\d+[_ ]*(Enrollment Patterns|Population and Students)?/i, "")
    .replace(/^\s*DC School Report(\s*Card)?\s*/i, "")
    .replace(/\s*[-–]?\s*Metric Scores\s*$/i, "")
    .replace(/\s*Metrics\s*$/i, "")
    .replace(/\s*[-–:]\s*$/, "")
    .replace(/\s{2,}/g, " ").trim();
  return t || stripYearTokens(name).replace(/\s{2,}/g, " ").trim() || name;
}
// Aggressive normalization for the GROUPING key only (titles stay readable):
// collapse applicant/application drift, drop filler + boilerplate words, so the
// same dataset under slightly different yearly names lands in one series.
function seriesKey(owner, name) {
  const s = stripYearTokens(name).toLowerCase()
    .replace(/[^a-z0-9]+/g, " ")
    .replace(/\b\d+\b/g, " ")
    .replace(/applicat\w*|applican\w*/g, "applicant")
    .replace(/\b(by|and|the|of|for|in|a|to|per|with)\b/g, " ")
    .replace(/\b(lottery|data|dc|school|report|card|metric|metrics|scores|score|number|public|file|files)\b/g, " ")
    .replace(/\s+/g, " ").trim();
  return owner + "|" + s;
}
function yearNum(y) { const m = String(y || "").match(/(19|20)\d{2}/); return m ? +m[0] : 0; }

function renderFiles() {
  const terms = queryTerms();
  const hits = ALL_FILES.filter(e => {
    if (state.owner && e.owner !== state.owner) return false;
    if (state.topic && !(e.file.topics || []).includes(state.topic)) return false;
    return terms.every(t => fileTermMatch(e.text, t));
  });

  // group the matching files into dataset series. An explicit file.series (set by
  // the generator for per-school / drifting-name sets) wins; else fall back to the
  // year-stripping heuristic. The chip shows file.label (e.g. a school name) when
  // present, otherwise the year.
  // Each grouped item keeps its OWN source page, because one dataset's years can
  // be hosted on different pages (e.g. assessment years on per-year OSSE pages).
  const groups = new Map();
  for (const e of hits) {
    const key = e.file.series ? e.owner + "|" + e.file.series : seriesKey(e.owner, e.file.name);
    const title = e.file.series || seriesTitle(e.file.name);
    if (!groups.has(key)) groups.set(key, { title, owner: e.owner, files: [] });
    groups.get(key).files.push({ file: e.file, sourceUrl: e.sourceUrl, sourceName: e.sourceName });
  }
  const chipLabel = x => x.file.label || x.file.year || "?";
  const maxYear = g => Math.max(...g.files.map(x => yearNum(chipLabel(x))), 0);
  // most years first, then most recent, then title
  const list = [...groups.values()].sort((a, b) =>
    b.files.length - a.files.length || maxYear(b) - maxYear(a) || a.title.localeCompare(b.title));

  document.getElementById("count").textContent =
    list.length + " dataset series · " + hits.length + " of " + ALL_FILES.length + " files";

  document.getElementById("files").innerHTML = list.length
    ? list.map(g => {
        const items = g.files.slice().sort((a, b) =>
          (yearNum(chipLabel(a)) - yearNum(chipLabel(b))) || chipLabel(a).localeCompare(chipLabel(b)));
        const latest = items[items.length - 1];
        const multiPage = new Set(items.map(x => x.sourceUrl)).size > 1;

        // every file gets a pair: ⬇ download the file, and ↗ the page it lives on
        const chips = items.map(x =>
          '<span class="filepair">'
          + '<a class="year-chip dl" href="' + esc(x.file.url) + '" target="_blank" rel="noopener" title="Download '
          + esc(x.file.kind) + " (" + esc(chipLabel(x)) + ") — " + esc(fileSummary(x.file)) + '">⬇ '
          + esc(chipLabel(x)) + (x.file.kind === "pdf" ? " 📄" : "") + "</a>"
          + '<a class="year-chip pg" href="' + esc(x.sourceUrl) + '" target="_blank" rel="noopener" '
          + 'title="Open the page where this file is hosted: ' + esc(x.sourceName) + '">↗</a>'
          + "</span>").join("");

        // badge: count DISTINCT years (not files — a year can have several files),
        // plus the range and, when they differ, the file count.
        const distinctYears = [...new Set(items.map(x => yearNum(chipLabel(x))).filter(y => y > 0))];
        let span = "";
        if (distinctYears.length >= 2) {
          let txt = distinctYears.length + " years · " + Math.min(...distinctYears) + "–" + Math.max(...distinctYears);
          if (items.length > distinctYears.length) txt += " · " + items.length + " files";
          span = '<span class="badge bg-secondary">' + txt + "</span> ";
        } else if (items.length > 1) {
          span = '<span class="badge bg-secondary">' + items.length + " files</span> ";
        }
        return '<div class="src-card"><div class="d-flex justify-content-between align-items-start">'
          + '<h6 class="mb-1">' + highlight(esc(g.title), terms) + "</h6>" + span + "</div>"
          + '<div class="file-cols mb-2">' + esc(g.owner) + " · " + esc(latest.sourceName)
          + (multiPage ? " + other pages" : "") + " — " + highlight(esc(fileSummary(latest.file)), terms) + "</div>"
          + '<div class="file-cols mb-1">each file: <b>⬇</b> download · <b>↗</b> page it lives on</div><div>' + chips + "</div></div>";
      }).join("")
    : '<div class="alert alert-light border">No files match. Try a shorter term (e.g. AP, SAT) or Clear.</div>';
}

const VIEWS = {
  files:    { div: "files",    tab: "tab-files",    render: renderFiles },
  sources:  { div: "results",  tab: "tab-sources",  render: renderSources },
  overlaps: { div: "overlaps", tab: "tab-overlaps", render: renderOverlaps },
};

function render() {
  for (const [name, v] of Object.entries(VIEWS)) {
    const active = name === state.view;
    document.getElementById(v.div).style.display = active ? "" : "none";
    document.getElementById(v.tab).classList.toggle("active", active);
  }
  // reflect filter state back onto the controls (single source of truth = state)
  for (const b of document.querySelectorAll("#topicchips .topic-btn"))
    b.classList.toggle("active", b.dataset.topic === state.topic);
  document.getElementById("owner").value = state.owner;
  VIEWS[state.view].render();
}

// ----- build filter dropdowns from the data -----
function option(value, label) {
  const o = document.createElement("option");
  o.value = value; o.textContent = label; return o;
}
function fillSelect(id, values, allLabel) {
  const sel = document.getElementById(id);
  sel.appendChild(option("", allLabel));
  for (const v of values) sel.appendChild(option(v, v));
}

const ownersWithSources = CAT.owners.map(o => o.key).filter(k => CAT.sources.some(s => s.owner === k));
fillSelect("owner", ownersWithSources, "All owners");
// clickable topic categories -> set state.topic (one click filters everything)
const TOPIC_CHIPS = [
  ["Enrollment", "enrollment"], ["Demographics", "demographics"], ["Test scores", "assessment"],
  ["Attendance", "attendance"], ["Graduation", "graduation"], ["Discipline", "discipline"],
  ["Finance", "finance"], ["Ratings", "accountability"], ["Lottery", "lottery"],
  ["Boundaries", "boundaries"], ["Facilities", "facilities"], ["Educators", "educators"],
  ["Directory", "profiles"], ["Early childhood", "early-childhood"],
];
const availableTopics = new Set(ALL_FILES.flatMap(e => e.file.topics || []));
for (const [label, tag] of TOPIC_CHIPS) {
  if (!availableTopics.has(tag)) continue;
  const b = document.createElement("span");
  b.className = "topic-btn"; b.dataset.topic = tag; b.textContent = label;
  b.addEventListener("click", () => { state.topic = state.topic === tag ? "" : tag; render(); });
  document.getElementById("topicchips").appendChild(b);
}

document.getElementById("subtitle").textContent =
  CAT.sources.length + " sources · " + CAT.sources.reduce((n, s) => n + (s.files ? s.files.length : 0), 0)
  + " profiled files · verified " + CAT.last_verified;
document.getElementById("verified").textContent = "Last verified " + CAT.last_verified + ".";

// ----- bind events once (elements are long-lived; no re-binding) -----
document.getElementById("q").addEventListener("input", e => { state.q = e.target.value; render(); });
document.getElementById("owner").addEventListener("change", e => { state.owner = e.target.value; render(); });
document.getElementById("clear").addEventListener("click", () => {
  state.q = state.owner = state.topic = "";
  document.getElementById("q").value = "";
  document.getElementById("owner").value = "";
  render();
});
for (const [name, v] of Object.entries(VIEWS)) {
  document.getElementById(v.tab).addEventListener("click", e => {
    e.preventDefault(); state.view = name; render();
  });
}

render();
</script>
</body>
</html>
