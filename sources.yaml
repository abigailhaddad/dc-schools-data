# DC K-12 Public Schools Data — Source Catalog
# =============================================
# This file is the SOURCE OF TRUTH. Edit it, then run `python generate_readme.py`
# to regenerate README.md.
#
# Scope: K-12 public education data (DCPS + public charters) published by OSSE,
# DCPS, the DC Public Charter School Board (DC PCSB), and the Deputy Mayor for
# Education (DME), plus a few cross-cutting citywide sources. No higher ed.
#
# Field reference (per source):
#   id           short stable slug (used to cross-reference in `overlaps`)
#   name         human title
#   owner        publishing entity (see `owners` block below for display order)
#   url          canonical working URL
#   topics       list of subject tags (used to group the overlap analysis)
#   authority    authoritative | derived | republished | third-party  -- see legend
#   status       ok | js-rendered | login-required | stale | unstable | unverified
#   format       how the data is delivered
#   cadence      how often it updates
#   years        what time span the page/file actually holds
#   notes        gotchas, fragmentation, where older years live, overlaps
#
# `last_verified` is the month the research sweep confirmed these URLs.
last_verified: "2026-06"

owners:
  - key: OSSE
    name: "OSSE — Office of the State Superintendent of Education"
    blurb: "DC's state education agency. Cross-sector (DCPS + charter) source for enrollment, assessments, attendance, graduation, discipline, finance, and the DC School Report Card / STAR ratings."
  - key: DCPS
    name: "DCPS — DC Public Schools"
    blurb: "The traditional public school district. Publishes its own (DCPS-only) enrollment, outcomes, budgets, surveys, profiles, and facilities data — much of it a subset of OSSE's."
  - key: "DC PCSB"
    name: "DC PCSB — DC Public Charter School Board"
    blurb: "Authorizer/regulator of DC's public charter schools. Publishes charter directories, the School Quality Report (SQR) accountability framework, finances, and equity data."
  - key: DME
    name: "DME — Deputy Mayor for Education"
    blurb: "Mayor's office for education strategy. Runs EdScape (the neighborhood education-landscape tool), the Master Facilities Plan, and boundary/enrollment-planning data."
  - key: "My School DC"
    name: "My School DC — Common Lottery"
    blurb: "The single DCPS + charter application/lottery. Publishes lottery participation, match rates, and waitlist data."
  - key: "Open Data DC"
    name: "Open Data DC / DCGIS"
    blurb: "The city's open-data and GIS portal. Machine-readable school locations and attendance-zone boundaries."
  - key: "DC Policy Center"
    name: "DC Policy Center (third party)"
    blurb: "Nonprofit think tank. Its annual 'State of D.C. Schools' and data tools synthesize and visualize OSSE/DME source data."
  - key: "U.S. Census"
    name: "U.S. Census Bureau"
    blurb: "School-age / under-18 population — the citywide denominator for enrollment-planning and capture-rate analysis."
  - key: EmpowerK12
    name: "EmpowerK12 (third party)"
    blurb: "Nonprofit that builds the interactive dashboards over OSSE Report Card data that OSSE/PCSB do not host themselves."

# Authority legend (rendered into README):
#   authoritative – the official system of record for this metric
#   derived       – a sector subset re-published from the authoritative source (DCPS-only / charter-only)
#   republished   – the same numbers re-hosted/analyzed, often pointing back to the source
#   third-party   – produced by a non-government organization from official data

