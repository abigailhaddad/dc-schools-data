# =====================================================================
# OVERLAPS — where the same data appears in multiple places, and how they
# differ. This is the heart of the catalog: the point is not just to list
# sources but to say which one to trust and why they disagree.
# =====================================================================
overlaps:
  - topic: "Enrollment counts"
    sources: [osse-enrollment-audit, dcps-dataset-enrollment, pcsb-student-enrollment, edscape-enrollment-patterns, dc-school-report-card-site]
    difference: >
      OSSE publishes the cross-sector audited fall count (by school; used for
      funding). DCPS and PCSB each publish their own sector's slice — DCPS by
      school/grade, PCSB by tier/ward plus market-share analysis. EdScape geocodes
      the OSSE figures to neighborhoods/wards/boundaries and adds projections. The
      Report Card shows per-school enrollment. Counts can differ by rounding,
      vintage, or small-cell suppression.

  - topic: "School accountability ratings"
    sources: [dc-school-report-card-site, osse-star-technical-guide, pcsb-sqr, pcsb-aspire, pcsb-pmf-archive, empowerk12-dashboard]
    difference: >
      Two different scales. OSSE's STAR rating is 1–5 stars and covers both DCPS and
      charters. DC PCSB's School Quality Report (SQR), built on the ASPIRE system,
      scores charters 0–100 with Tier 1/2/3 (charters only). The older PMF (archived
      at 2018-19) is a separate charter tiering. EmpowerK12 re-presents the OSSE STAR
      data interactively. A charter can carry both a STAR rating and an SQR tier;
      they're not the same scale, so note which framework and year a score/tier is from.

  - topic: "Assessment / proficiency (ELA & math)"
    sources: [osse-assessment-2025, osse-assessment-archive, dc-school-report-card-site, dcps-downloadable-datasets, pcsb-assessment]
    difference: >
      OSSE administers DC CAPE (formerly PARCC) and MSAA and posts cross-sector
      results; the Report Card displays them per school. DCPS and PCSB each post
      their own sector's subset. Sector pages can lag OSSE's release and may apply
      different suppression.

  - topic: "Graduation rate (ACGR)"
    sources: [osse-graduation, dcps-dataset-graduation, dc-school-report-card-site]
    difference: >
      OSSE publishes the cross-sector 4- and 5-year ACGR with subgroups. DCPS posts
      the DCPS-only subset of the same calculation; the Report Card shows it per school.

  - topic: "Attendance / chronic absenteeism"
    sources: [osse-attendance, osse-attendance-dashboard, dc-school-report-card-site, dcps-glance-attendance, pcsb-discipline-attendance]
    difference: >
      OSSE publishes citywide chronic absenteeism and chronic truancy (a 10%
      threshold). DCPS's at-a-glance PDFs are district-level aggregates; PCSB's
      report is charter-only. Note that 'attendance rate' and 'chronic absenteeism'
      are different measures.

  - topic: "Discipline (suspensions/expulsions)"
    sources: [osse-discipline, dc-school-report-card-site, pcsb-equity-reports, pcsb-discipline-attendance]
    difference: >
      OSSE's 'State of Discipline' report and the Report Card carry current
      cross-sector discipline data (by-school detail in PDF appendices). PCSB's
      School Equity Reports carried charter discipline/mobility through SY2017-18;
      later charter discipline appears in the OSSE data.

  - topic: "Demographics (race, SWD, EL, at-risk)"
    sources: [osse-aggregate-enrollment, dc-school-report-card-site, edscape, dcps-glance-enrollment, pcsb-student-enrollment]
    difference: >
      OSSE's Report Card 'Aggregate Enrollment Data' Excel breaks enrollment down by
      race/SWD/EL/at-risk at the school level. EdScape recasts it by neighborhood/ward.
      DCPS and PCSB pages cover their own sector, often as district/sector totals.
      Small subgroups may be suppressed (0%/100% hidden).

  - topic: "Per-pupil money"
    sources: [osse-finance-ppe, dcps-budget-portal, pcsb-school-finances]
    difference: >
      These measure different things. OSSE's ESSA per-pupil reports are actual
      EXPENDITURE (cross-sector, ex-post). DCPS's budget portal is ALLOCATIONS under
      the three-factor model (ex-ante, DCPS only). PCSB's finance pages are charter
      actuals/audits. An allocation and an expenditure aren't the same number.

  - topic: "Facilities, capacity & utilization"
    sources: [edscape-facilities, mfp-2023, mfp-2024-supplement, dcps-modernizations, dme-facility-maps]
    difference: >
      EdScape Ch.3 and the Master Facilities Plan give cross-sector capacity,
      utilization, and projections (DME, with OSSE/DCPS/PCSB/DGS). DCPS's
      modernizations page and DGS cover DCPS capital projects.

  - topic: "Boundaries & feeder patterns"
    sources: [dcps-feeder-patterns, dcps-find-inboundary, opendata-attendance-zones, dme-boundary-study, edscape-enrollment-patterns]
    difference: >
      Only DCPS has attendance boundaries/feeders (charters are citywide-choice).
      DCPS publishes the feeder PDFs and an address lookup; Open Data DC has the GIS
      boundary polygons (current and historical); DME holds the boundary policy and
      the 2023 study data; EdScape shows how enrollment flows across boundaries.

  - topic: "School directory / locations"
    sources: [opendata-dcps-locations, opendata-charter-locations, dcps-school-profiles, pcsb-school-profiles, pcsb-directory-pdf, dc-school-report-card-site]
    difference: >
      Open Data DC has machine-readable locations (separate DCPS and charter GIS
      layers). DCPS Profiles and PCSB School Profiles/Directory are the
      human-browsable directories for each sector; the Report Card lists both.
      School-ID crosswalks: the DCPS School Directory PDF and the OSSE enrollment files.
