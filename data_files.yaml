# Individual DC schools DATA FILES (direct download URLs)
# ========================================================
# This is the file-level layer under sources.yaml. Each entry is ONE downloadable
# file (xlsx / csv / pdf), with a direct URL, tied to a source via `source_id`.
#
# `profile_files.py` downloads each `url` and records its structure (sheet/tab
# names + columns for spreadsheets, page count + extracted text/tables for PDFs)
# into file_profiles.json, which `generate_readme.py` folds into the catalog.
#
# Fields:
#   id         stable slug for the file
#   source_id  the parent source in sources.yaml
#   name       human title
#   url        DIRECT download URL (must return the file itself, not a landing page)
#   kind       xlsx | xls | csv | pdf
#   year       the school/report year the file covers (string)
#   topics     subject tags
#
# NOTE on coverage: this list is SEEDED with the direct file URLs the research
# sweep verified. Many OSSE/PCSB files live behind Box.com / Egnyte share links or
# on JS-rendered pages and have no scrapeable direct URL — those must be harvested
# with a browser (see the `update-dc-schools-data` skill). Add them here as you
# find their real download URLs.

